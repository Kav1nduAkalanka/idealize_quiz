<!DOCTYPE html>
<html style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEALIZE Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Orbitron:wght@600;700&display=swap');

        :root {
            --ink: #f2f6ff;
            --cyan: #7fd7ff;
            --pink: #ff9bcf;
            --violet: #b89bff;
            --glass: rgba(10, 12, 26, 0.72);
            --glass-soft: rgba(10, 12, 26, 0.58);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://raw.githubusercontent.com/Kav1nduAkalanka/idealize_quiz/main/background.webp');
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: center;
            color: var(--ink);
            text-align: center;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #080a1e;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
                background-attachment: scroll;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            width: min(92vw, 920px);
            margin: 0 auto;
            padding: 32px 34px 26px;
        }

        @media (max-width: 768px) {
            .card {
                max-width: 95%;
                padding: 20px;
                border-radius: 16px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 15px;
                border-radius: 14px;
                max-width: 100%;
                border: 1px solid var(--glass-border);
            }
        }

        h2 {
            font-family: 'Orbitron', 'Montserrat', sans-serif;
            color: var(--ink);
            margin-bottom: 16px;
            font-size: 2em;
            letter-spacing: 0.02em;
        }

        .sound-toggle {
            position: fixed;
            top: 18px;
            left: 18px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-soft);
            color: var(--ink);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            cursor: pointer;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .sound-toggle:active {
            transform: scale(0.98);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--ink);
        }

        th {
            background: var(--glass-soft);
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.08em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        tbody tr {
            background: transparent;
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 768px) {
            th,
            td {
                padding: 12px 8px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            th,
            td {
                padding: 10px 6px;
                font-size: 0.8em;
            }

            th {
                font-size: 0.75em;
            }
        }

        .rank-1 {
            font-weight: bold;
            font-size: 1.2em;
            color: #ffd65a;
        }

        .rank-2 {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--cyan);
        }

        .rank-3 {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--pink);
        }

        .score-cell {
            font-weight: bold;
            color: #9fffd6;
            font-size: 1.1em;
        }
        
        .time-cell {
            color: #c6d2ff;
        }
    </style>
</head>

<body>
    <audio controls loop preload="auto" style="display: none;" id="bg-music">
        <source src="https://raw.githubusercontent.com/Kav1nduAkalanka/idealize_quiz/main/quiz_bgm.mp3" type="audio/mpeg">
    </audio>
    <button class="sound-toggle" id="play-toggle" type="button" aria-label="Toggle music">🔊</button>
    <div class="card">
        <h2>🏆 Leaderboard</h2>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Time</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="4">Loading live scores...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
       const API_URL = "https://script.google.com/macros/s/AKfycbxHThHDNqJ2QjlGtBjTmMVQuM_H-onYE6R2kO2adZP-x6vXQJjHRkRsQrm49T_c2NvT/exec";

        async function fetchLeaderboard() {
            try {
                // The ?t= trick forces the browser to pull fresh data every time
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                const data = await response.json();

                updateTable(data);
            } catch (error) {
                console.error("Error pulling leaderboard data:", error);
                const tbody = document.getElementById('leaderboard-body');
                // Only show error text if the board is empty, avoids flashing during random Wi-Fi blips
                if (tbody.children.length === 1 && tbody.textContent.includes("Loading")) {
                    tbody.innerHTML = '<tr><td colspan="4" style="color: #ff9bcf;">Error loading scores. Retrying...</td></tr>';
                }
            }
        }

        function updateTable(data) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No scores submitted yet. Waiting for first entry...</td></tr>';
                return;
            }

            data.forEach((row, index) => {
                const rank = index + 1;
                const tr = document.createElement('tr');

                let rankClass = rank <= 3 ? `rank-${rank}` : '';

                // Strip the "In time ()" wrapper so it just shows "7m 53s"
                let cleanTime = row.timeString;
                if (cleanTime.includes('(') && cleanTime.includes(')')) {
                    cleanTime = cleanTime.split('(')[1].split(')')[0]; 
                }

                tr.innerHTML = `
            <td class="${rankClass}">#${rank}</td>
            <td style="text-align: left;">${row.identifier}</td>
            <td class="time-cell">⏱️ ${cleanTime}</td>
            <td class="score-cell">${row.score}</td>
          `;
                tbody.appendChild(tr);
            });
        }

        const audio = document.getElementById('bg-music');
        const playToggle = document.getElementById('play-toggle');

        playToggle.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playToggle.textContent = '🔊';
                playToggle.setAttribute('aria-label', 'Mute music');
            } else {
                audio.pause();
                playToggle.textContent = '🔇';
                playToggle.setAttribute('aria-label', 'Play music');
            }
        });

        // Fetch immediately on load, then poll every 5 seconds
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 5000);
    </script>
</body>

</html>
